name: Build Online Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. فك ضغط ملف المشروع المرفوع
      - name: Unzip project files
        run: unzip *.zip -d project_dir

      # 4. بناء وتوقيع ملف الـ Release APK للتطبيق الأونلاين
      - name: Build and Sign Release APK
        env:
          _JAVA_OPTIONS: "-Djava.awt.headless=true"
          GRADLE_OPTS: "-Djava.awt.headless=true -Dorg.gradle.jvmargs=-Djava.awt.headless=true"
        run: |
          TARGET_DIR=$(find project_dir -name "settings.gradle.kts" -exec dirname {} \;)
          if [ -z "$TARGET_DIR" ]; then
            echo "❌ خطأ: لم يتم العثور على ملفات مشروع أندرويد!"
            exit 1
          fi
          cd "$TARGET_DIR"
          
          echo "🛠️ 1. تجهيز الـ Gradle Wrapper وتصاريح التشغيل..."
          gradle wrapper
          chmod +x gradlew
          
          echo "🛠️ 2. إنشاء مفتاح my-upload-key.jks المطلوب بملف Gradle..."
          keytool -genkey -v -keystore my-upload-key.jks \
            -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "android" \
            -keypass "android" \
            -dname "CN=Online App, OU=Dev, O=App, L=Basra, C=IQ"

          echo "🛠️ 3. إنشاء ملف google-services.json متوافق مع اسم الحزمة الحقيقي..."
          cat <<EOF > app/google-services.json
          {
            "project_info": {
              "project_number": "123456789",
              "project_id": "debt-tracker-online"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:123456",
                  "android_client_info": {
                    "package_name": "com.aistudio.debttracker.iqdb"
                  }
                },
                "api_key": [
                  {
                    "current_key": "mock_api_key_here"
                  }
                ]
              }
            ]
          }
          EOF

          echo "🚀 4. تنفيذ بناء نسخة الـ Release الموقعة..."
          ./gradlew assembleRelease --no-daemon

          echo "✅ تم البناء والتوقيع بنجاح!"

      # 5. رفع ملف الـ APK النهائي الجاهز للتنزيل والتثبيت
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DebtTracker-Online-Release-APK
          path: project_dir/**/build/outputs/apk/release/*.apk
